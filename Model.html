<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Solar Simulation - Solar Altar</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 2.5;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 1.2;
controls.maxDistance = 5;

// =======================
// 🌋 NASA PLASMA SHADER (3D fBM + Warping)
// =======================

const vertexShader = `
varying vec3 vNormal;
varying vec3 vPosition;
varying vec2 vUv;

void main() {
    vUv = uv;
    vNormal = normalize(normalMatrix * normal);
    vPosition = position;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
`;

const fragmentShader = `
uniform float time;
varying vec3 vNormal;
varying vec3 vPosition;

// Funkcje pomocnicze do generowania szumu 3D
vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

float snoise(vec3 v) {
    const vec2 C = vec2(1.0/6.0, 1.0/3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i  = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    vec4 j = p - 49.0 * floor(p * (1.0/49.0));
    vec4 x_ = floor(j * (1.0/7.0));
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * (1.0/7.0) + 0.5/7.0;
    vec4 y = y_ * (1.0/7.0) + 0.5/7.0;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0)*2.0 + 1.0;
    vec4 s1 = floor(b1)*2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m * m; return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}

// Fractal Brownian Motion
float fbm(vec3 p) {
    float v = 0.0;
    float a = 0.5;
    for (int i = 0; i < 4; i++) {
        v += a * snoise(p);
        p *= 2.0;
        a *= 0.5;
    }
    return v;
}

void main() {
    // Domain Warping - klucz do realizmu
    vec3 p = vPosition * 2.5;
    float q = fbm(p + time * 0.1);
    float r = fbm(p + q + time * 0.15);
    
    // Tworzenie "gorących" włókien plazmy
    float strength = smoothstep(0.2, 0.8, r);
    
    // Paleta NASA (Głęboki burgund -> Ognisty pomarańcz -> Złoty)
    vec3 deepRed = vec3(0.2, 0.0, 0.0);
    vec3 plasma = vec3(1.0, 0.25, 0.0);
    vec3 core = vec3(1.0, 0.7, 0.1);
    
    vec3 color = mix(deepRed, plasma, strength);
    color = mix(color, core, pow(strength, 3.0));

    // Efekt granulacji (małe kropki na słońcu)
    float grain = snoise(vPosition * 50.0) * 0.1;
    color += grain * strength;

    // Atmosfera/Fresnel
    float fresnel = pow(1.0 - dot(vNormal, vec3(0,0,1)), 3.0);
    color += fresnel * vec3(1.0, 0.4, 0.1);

    gl_FragColor = vec4(color, 1.0);
}
`;

const starMaterial = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 } },
    vertexShader,
    fragmentShader
});

const star = new THREE.Mesh(new THREE.SphereGeometry(1, 128, 128), starMaterial);
scene.add(star);

// =======================
// 🌟 ADVANCED CORONA
// =======================

const coronaGeometry = new THREE.SphereGeometry(1.4, 64, 64);
const coronaMaterial = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    transparent: true,
    uniforms: { time: { value: 0 } },
    vertexShader: `
        varying vec3 vNormal;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        varying vec3 vNormal;
        uniform float time;
        void main() {
            float intensity = pow(0.6 - dot(vNormal, vec3(0,0,1)), 4.0);
            float pulse = 0.8 + 0.2 * sin(time * 2.0);
            gl_FragColor = vec4(1.0, 0.2, 0.0, 1.0) * intensity * pulse;
        }
    `
});

const corona = new THREE.Mesh(coronaGeometry, coronaMaterial);
scene.add(corona);

// =======================
// 🔄 ANIMATION LOOP
// =======================

function animate(t) {
    requestAnimationFrame(animate);
    const timeValue = t * 0.001;
    
    starMaterial.uniforms.time.value = timeValue;
    coronaMaterial.uniforms.time.value = timeValue;
    
    star.rotation.y += 0.0015;
    
    controls.update();
    renderer.render(scene, camera);
}

animate(0);

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
